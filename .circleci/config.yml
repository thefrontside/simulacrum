version: 2.1
orbs:
  node: circleci/node@4.3.0
jobs:
  test:
    docker:
      - image: cimg/node:15.14.0
    steps:
      - checkout
      - run: wget https://github.com/FiloSottile/mkcert/releases/download/v1.4.3/mkcert-v1.4.3-linux-amd64
      - run: mv mkcert-v1.4.3-linux-amd64 mkcert
      - run: export CWD=$(pwd)
      - run: chmod +x mkcert
      - run: sudo cp mkcert /usr/local/bin/
      - run: mkdir -p ~/.simulacrum/certs
      - run: export NODE_EXTRA_CA_CERTS="$(mkcert -CAROOT)/rootCA.pem"
      - run:
          command: sudo mkcert -install && mkcert localhost
          working_directory: ~/.simulacrum/certs
      - node/install-packages
      - run: npm run build
      - run: npm run test
  examples:
    parameters:
      example:
        type: string
    docker:
      - image: cimg/node:15.14.0
    steps:
      - checkout
      - run: wget https://github.com/FiloSottile/mkcert/releases/download/v1.4.3/mkcert-v1.4.3-linux-amd64
      - run: mv mkcert-v1.4.3-linux-amd64 mkcert
      - run: export CWD=$(pwd)
      - run: chmod +x mkcert
      - run: sudo cp mkcert /usr/local/bin/
      - run: mkdir -p ~/.simulacrum/certs
      - run: export NODE_EXTRA_CA_CERTS="$(mkcert -CAROOT)/rootCA.pem"
      - run:
          command: sudo mkcert -install && mkcert localhost
          working_directory: ~/.simulacrum/certs
      - node/install-packages:
          app-dir: << parameters.example >>
      - run:
          working_directory: << parameters.example >>
          command: npm run test

workflows:
  tests:
    jobs:
      - test
      - examples:
          matrix:
            parameters:
              example:
                [
                  "examples/nextjs-with-auth0-react",
                  "examples/nextjs-with-nextjs-auth0",
                ]
